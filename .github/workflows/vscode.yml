name: vscode-extension

on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch:

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  build-server:
    name: Build luck (${{ matrix.label }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: win32-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            binary: luck.exe
          - label: win32-arm64
            os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            binary: luck.exe
          - label: linux-x64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            binary: luck
          - label: linux-arm64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            binary: luck
          - label: darwin-x64
            os: macos-latest
            rust_target: x86_64-apple-darwin
            binary: luck
          - label: darwin-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            binary: luck
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.rust_target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux ARM cross-compiler
        if: matrix.label == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Cargo build
        run: cargo build -p luck_cli --release --target ${{ matrix.rust_target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: luck-${{ matrix.label }}
          path: target/${{ matrix.rust_target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  package-vsix:
    name: Package VSIX (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: build-server
    strategy:
      fail-fast: false
      matrix:
        label:
          - win32-x64
          - win32-arm64
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: luck-${{ matrix.label }}
          path: editors/vscode/server/${{ matrix.label }}

      - name: Make binary executable (non-Windows)
        if: matrix.label != 'win32-x64' && matrix.label != 'win32-arm64'
        run: chmod +x editors/vscode/server/${{ matrix.label }}/luck

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm install --no-audit --no-fund

      - name: Compile + bundle
        working-directory: editors/vscode
        run: npm run bundle

      - name: Package VSIX for ${{ matrix.label }}
        working-directory: editors/vscode
        run: npx --yes @vscode/vsce package --target ${{ matrix.label }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: luck-${{ matrix.label }}.vsix
          path: editors/vscode/*.vsix
          if-no-files-found: error

  publish:
    name: Publish to Marketplace + Open VSX
    runs-on: ubuntu-latest
    needs: package-vsix
    if: startsWith(github.ref, 'refs/tags/vscode-v')
    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: luck-*.vsix
          merge-multiple: true
          path: dist
      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath dist/*.vsix
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish dist/*.vsix
