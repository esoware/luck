# Benchmarks are sharded: each pipeline stage runs as a separate job,
# built and executed under CodSpeed with the `codspeed` feature enabled.
# Modeled on oxc's benchmark workflow.

name: Benchmark

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths: &paths
      - "crates/**/*.rs"
      - "crates/luck_benchmark/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/benchmark.yml"
  push:
    branches:
      - main
    paths: *paths

permissions:
  contents: read
  id-token: write # for OpenID Connect authentication with CodSpeed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          [
            lexer,
            parser,
            semantic,
            linter,
            codegen,
            formatter,
            minifier,
            bundler,
            synth,
          ]
    name: Bench ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: benchmark
          save-if: ${{ github.ref_name == 'main' }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build benchmark
        run: |
          cargo codspeed build -p luck_benchmark \
            --bench ${{ matrix.component }} --features codspeed

      - name: Run benchmark
        uses: CodSpeedHQ/action@v4
        timeout-minutes: 30
        with:
          mode: simulation
          run: cargo codspeed run ${{ matrix.component }}

  minsize:
    runs-on: ubuntu-latest
    name: Minsize snapshot
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: benchmark
          save-if: false

      - name: Check minsize.snap is current
        run: cargo test -p luck_benchmark --test metrics minsize_is_up_to_date -- --ignored
