# ---- file handle shape (io.open and friends) ----

# Read formats ("*l", "*n", "*a", or a byte count) are variadic and mix
# string constants with numbers, so they stay a plain vararg - a
# constant set would reject numeric counts.
[shapes.file.members.read]
kind = "function"
method = true
min_args = 0
max_args = -1
params = [{ kind = "vararg", required = false }]

# 5.1 file:lines takes no formats; they arrived in 5.2.
[shapes.file.members.lines]
kind = "function"
method = true
must_use = true
min_args = 0
max_args = 0

# 5.1 file:write returns nothing; the chainable file return is 5.2+.
[shapes.file.members.write]
