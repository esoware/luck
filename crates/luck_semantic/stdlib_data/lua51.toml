# Lua 5.1 standard library, verified against the 5.1 reference manual
# (https://www.lua.org/manual/5.1/). Undocumented-but-real interpreter
# surface (gcinfo, newproxy, arg, _PROMPT) is included and marked where
# luck already suggests the modern replacement.
#
# Schema (see crates/luck_semantic/src/stdlib_model.rs): entries are
# kind = "function" | "namespace" | "constant" | "property"; functions
# carry a flat signature (min_args/max_args/params, -1 = unbounded) or
# an overloads array; [shapes.<name>.members.*] declare value shapes
# (file handles; the string receiver is derived at load).
# Cross-file consistency is enforced by tests/drift.rs.

[globals._G]
kind = "property"
read_only = false

[globals._VERSION]
kind = "property"

# Interactive-interpreter prompt overrides (manual section 6).
[globals._PROMPT]
kind = "property"
read_only = false

[globals._PROMPT2]
kind = "property"
read_only = false

[globals.assert]
kind = "function"
min_args = 1
max_args = -1
params = [
  { kind = "any" },
  { kind = "string", required = false },
  { kind = "vararg", required = false },
]

[globals.collectgarbage]
kind = "function"
min_args = 0
max_args = 2
params = [
  { kind = "constant", values = ["collect", "count", "restart", "setpause", "setstepmul", "step", "stop"], required = false },
  { kind = "number", required = false },
]

[globals.dofile]
kind = "function"
