# Lua 5.1 standard library descriptors. Mirrors Selene's lua51.yml.
#
# Schema (see crates/luck_semantic/src/stdlib_model.rs):
#   kind = "function" | "namespace" | "constant" | "property"
#   max_args = -1 means unbounded
#   read_only defaults to true; set false for properties like package.path

# ---- bare-word globals ----

[globals._G]
kind = "property"
read_only = false

[globals._VERSION]
kind = "property"

[globals.assert]
kind = "function"
min_args = 1
max_args = -1
params = [
  { kind = "any" },
  { kind = "string", required = false },
]

[globals.collectgarbage]
kind = "function"
min_args = 0
max_args = 2
params = [
  { kind = "constant", values = ["collect", "count", "restart", "setpause", "setstepmul", "step", "stop"], required = false },
  { kind = "number", required = false },
]

[globals.dofile]
kind = "function"
min_args = 0
max_args = 1
params = [{ kind = "string", required = false }]

[globals.error]
kind = "function"
min_args = 1
max_args = 2
params = [
  { kind = "any" },
  { kind = "number", required = false },
]

# Already deprecated in 5.1 in favor of collectgarbage('count'); removed in 5.2.
[globals.gcinfo]
kind = "function"
min_args = 0
max_args = 0
must_use = true
deprecated = { message = "use collectgarbage('count') instead", replace_template = "collectgarbage('count')" }

[globals.getfenv]
kind = "function"
min_args = 0
max_args = 1
must_use = true
params = [{ kind = "any", required = false }]

[globals.getmetatable]
kind = "function"
min_args = 1
max_args = 1
must_use = true
params = [{ kind = "any" }]

[globals.ipairs]
kind = "function"
min_args = 1
max_args = 1
is_pure = true
must_use = true
params = [{ kind = "table" }]

[globals.load]
kind = "function"
min_args = 1
max_args = 2
params = [
  { kind = "function" },
  { kind = "string", required = false },
]

[globals.loadfile]
kind = "function"
min_args = 0
max_args = 1
params = [{ kind = "string", required = false }]

[globals.loadstring]
kind = "function"
min_args = 1
max_args = 2
params = [
  { kind = "string" },
  { kind = "string", required = false },
]

[globals.module]
kind = "function"
min_args = 1
max_args = -1
params = [
  { kind = "string" },
  { kind = "vararg", required = false },
]

[globals.newproxy]
kind = "function"
min_args = 0
max_args = 1
must_use = true
params = [{ kind = "bool", required = false }]

[globals.next]
kind = "function"
min_args = 1
max_args = 2
