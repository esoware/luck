max_args = 1
must_use = true
params = [{ kind = "any" }]

[globals.ipairs]
kind = "function"
min_args = 1
max_args = 1
is_pure = true
must_use = true
params = [{ kind = "any" }]

[globals.load]
kind = "function"
min_args = 1
max_args = 4
params = [
  { kind = "any" },
  { kind = "string", required = false },
  { kind = "string", required = false },
  { kind = "any", required = false },
]

[globals.loadfile]
kind = "function"
min_args = 0
max_args = 3
params = [
  { kind = "string", required = false },
  { kind = "string", required = false },
  { kind = "any", required = false },
]

# `loadstring` was removed in Lua 5.2 from the spec, but most real
# codebases still encounter it (compatibility shims, embedded engines).
# Keep it visible as deprecated so the diagnostic fires with an actionable
# replace template.
[globals.loadstring]
kind = "function"
min_args = 1
max_args = 2
deprecated = { message = "removed in Lua 5.2+; use 'load' instead", replace_template = "load(%1)" }
params = [
  { kind = "string" },
  { kind = "string", required = false },
]

[globals.unpack]
kind = "function"
min_args = 1
max_args = 3
must_use = true
deprecated = { message = "deprecated in Lua 5.2+; use 'table.unpack' instead", replace_template = "table.unpack(%1)" }
params = [
  { kind = "table" },
  { kind = "number", required = false },
  { kind = "number", required = false },
]

