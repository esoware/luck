# Lua 5.5 standard library, verified against the 5.5 reference manual
# (https://www.lua.org/manual/5.5/). Notable vs 5.4:
#   - table.create, math.frexp, math.ldexp added
#   - collectgarbage reworked: setpause/setstepmul gone, tuning goes
#     through the "param" option; incremental/generational take no
#     extra arguments
#   - named varargs and the `global` keyword are parser-level, not
#     stdlib

[globals._G]
kind = "property"
read_only = false

[globals._VERSION]
kind = "property"

# Interactive-interpreter prompt overrides (manual, Lua Standalone).
[globals._PROMPT]
kind = "property"
read_only = false

[globals._PROMPT2]
kind = "property"
read_only = false

[globals.assert]
kind = "function"
min_args = 1
max_args = -1
params = [
  { kind = "any" },
  { kind = "string", required = false },
  { kind = "vararg", required = false },
]

# 5.5 reworked GC control: 'setpause'/'setstepmul' are gone; tuning goes
# through 'param' with a parameter name and an optional new value.
# 'incremental'/'generational' take no extra arguments in 5.5.
[globals.collectgarbage]
kind = "function"
overloads = [
  { min_args = 0, max_args = 1, params = [
    { kind = "constant", values = ["collect", "count", "generational", "incremental", "isrunning", "restart", "stop"], required = false },
  ] },
  { min_args = 1, max_args = 2, params = [
    { kind = "constant", values = ["step"] },
    { kind = "number", required = false },
  ] },
  { min_args = 2, max_args = 3, params = [
    { kind = "constant", values = ["param"] },
    { kind = "constant", values = ["majorminor", "minormajor", "minormul", "pause", "stepmul", "stepsize"] },
    { kind = "number", required = false },
  ] },
]

[globals.dofile]
kind = "function"
min_args = 0
max_args = 1
params = [{ kind = "string", required = false }]

[globals.error]
kind = "function"
min_args = 1
max_args = 2
params = [
  { kind = "any" },
  { kind = "number", required = false },
]

[globals.getmetatable]
