# Lua 5.2 standard library, verified against the 5.2 reference manual
# (https://www.lua.org/manual/5.2/). Notable vs 5.1:
#   - getfenv, setfenv, module, newproxy gone; loadstring kept as a
#     deprecated compat alias for load
#   - unpack, math.log10, math.mod, string.gfind, table.getn,
#     table.foreach, table.foreachi kept as deprecated compat entries
#     (their replacements exist in 5.2 itself)
#   - rawlen, bit32, table.pack, table.unpack, the debug uservalue and
#     upvalue functions added
#   - load/loadfile/xpcall/os.exit/io.lines/string.rep/math.log grow
#     new parameters; pairs/ipairs accept any __pairs/__ipairs subject

[globals._G]
kind = "property"
read_only = false

[globals._VERSION]
kind = "property"

[globals.assert]
kind = "function"
min_args = 1
max_args = -1
params = [
  { kind = "any" },
  { kind = "string", required = false },
  { kind = "vararg", required = false },
]

[globals.collectgarbage]
kind = "function"
min_args = 0
max_args = 2
params = [
  { kind = "constant", values = ["collect", "count", "generational", "incremental", "isrunning", "restart", "setpause", "setstepmul", "step", "stop"], required = false },
  { kind = "number", required = false },
]

[globals.dofile]
kind = "function"
min_args = 0
max_args = 1
params = [{ kind = "string", required = false }]

[globals.error]
kind = "function"
min_args = 1
max_args = 2
params = [
  { kind = "any" },
  { kind = "number", required = false },
]

[globals.getmetatable]
kind = "function"
min_args = 1
max_args = 1
must_use = true
params = [{ kind = "any" }]

[globals.ipairs]
kind = "function"
min_args = 1
max_args = 1
is_pure = true
must_use = true
params = [{ kind = "any" }]

[globals.load]
kind = "function"
min_args = 1
max_args = 4
params = [
  { kind = "any" },
  { kind = "string", required = false },
  { kind = "string", required = false },
  { kind = "any", required = false },
]

[globals.loadfile]
kind = "function"
min_args = 0
max_args = 3
params = [
  { kind = "string", required = false },
  { kind = "string", required = false },
  { kind = "any", required = false },
]

# Removed in 5.2 — Lua continued to ship it as a backwards-compat alias,
# so we keep it visible but force users toward `load`.
[globals.loadstring]
kind = "function"
min_args = 1
max_args = 2
deprecated = { message = "removed in Lua 5.2+; use 'load' instead", replace_template = "load(%1)" }
params = [
  { kind = "string" },
  { kind = "string", required = false },
]

[globals.next]
kind = "function"
min_args = 1
max_args = 2
params = [
  { kind = "table" },
  { kind = "any", required = false },
]

