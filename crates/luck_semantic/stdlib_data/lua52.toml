# ---- file handle shape (io.open and friends) ----

# Read formats ("*l", "*L", "*n", "*a", or a byte count) are variadic
# and mix string constants with numbers, so they stay a plain vararg - a
# constant set would reject numeric counts.
[shapes.file.members.read]
kind = "function"
method = true
min_args = 0
max_args = -1
params = [{ kind = "vararg", required = false }]

[shapes.file.members.lines]
kind = "function"
method = true
must_use = true
min_args = 0
max_args = -1
params = [{ kind = "vararg", required = false }]

# Returns the file itself, so writes chain.
[shapes.file.members.write]
kind = "function"
method = true
min_args = 0
max_args = -1
params = [{ kind = "vararg", required = false }]
returns = "file"

[shapes.file.members.seek]
