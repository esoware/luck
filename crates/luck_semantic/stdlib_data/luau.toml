# Luau library descriptors. Superset of every Luau flavor; each entry's
# `tier = "core" | "standalone" | "roblox"` (default core, set on a
# namespace to cover its members) tells tooling which flavor exposes it:
#   - core:       both standalone Luau and Roblox Luau
#   - standalone: luau-lang CLI only (e.g. loadstring)
#   - roblox:     Roblox runtime only
# A `.lua`/`.luau` target resolves to core+standalone (standalone Luau) or
# core+roblox (Roblox Luau) via StdlibEntry::available_in_luau.
#
# Coverage vs upstream Lua and standard Luau:
#   - dropped (absent from the Luau VM in BOTH flavors; never re-added):
#     dofile, loadfile, load, module, io, package (os keeps its
#     sandboxed clock/date/difftime/time subset)
#   - kept from Lua 5.1: getfenv, setfenv, newproxy (Luau uses
#     getfenv/setfenv instead of _ENV)
#   - core Luau VM additions: typeof, gcinfo, math.clamp/lerp/map/
#     noise/round/sign/isnan/isinf/isfinite, string.split,
#     table.clone/freeze/isfrozen/find/clear/create,
#     bit32.byteswap/countlz/countrz, utf8, vector, buffer,
#     coroutine.close/isyieldable, debug.info/debug.traceback only
#   - standalone-only (tier = "standalone"): loadstring
#   - Roblox-only (tier = "roblox"): task, bit (legacy bit lib), warn,
#     wait/spawn/delay, the DataModel globals (game, workspace, script,
#     plugin, shared, Enum, …), and the datatype constructors
#     (Vector3, CFrame, Instance, Color3, UDim2, …)

# ---- bare-word globals ----

[globals._G]
kind = "property"
read_only = false

[globals._VERSION]
kind = "property"

[globals.assert]
kind = "function"
min_args = 1
max_args = -1
params = [
  { kind = "any" },
  { kind = "string", required = false },
]

[globals.collectgarbage]
kind = "function"
min_args = 0
max_args = 1
must_use = true
params = [
  { kind = "constant", values = ["count"], required = false },
]

[globals.error]
kind = "function"
min_args = 1
max_args = 2
params = [
  { kind = "any" },
  { kind = "number", required = false },
]

[globals.gcinfo]
