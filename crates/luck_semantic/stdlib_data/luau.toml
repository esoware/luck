# Standalone Luau standard library: the complete global surface of the
# open-source Luau VM and CLI (luau / luau-analyze), with no Roblox
# additions. The Roblox environment lives in luau_roblox.toml as a fully
# independent file - the two are deliberately split, not layered, because
# the environments diverge in both directions (loadstring exists here but
# not there; task/datatypes exist there but not here). Shared entries are
# duplicated on purpose; drift guards keep them honest.
#
# Format: see stdlib_model.rs. kind = "function" | "constant" |
# "property" | "namespace"; functions carry either a flat signature
# (min_args/max_args/params) or an overloads array; max_args = -1 means
# unbounded.

# Coverage notes vs upstream Lua:
#   - absent from the Luau VM: dofile, loadfile, load, module, io,
#     package (os keeps its sandboxed clock/date/difftime/time subset)
#   - kept from Lua 5.1: getfenv, setfenv, newproxy (Luau uses
#     getfenv/setfenv instead of _ENV)

# ---- bare-word globals ----

[globals._G]
kind = "property"
read_only = false

[globals._VERSION]
kind = "property"

[globals.assert]
kind = "function"
min_args = 1
max_args = -1
params = [
  { kind = "any" },
  { kind = "string", required = false },
  { kind = "vararg", required = false },
]

[globals.collectgarbage]
kind = "function"
min_args = 0
max_args = 1
must_use = true
params = [
  { kind = "constant", values = ["count"], required = false },
]

[globals.error]
kind = "function"
min_args = 1
max_args = 2
params = [
  { kind = "any" },
  { kind = "number", required = false },
]

[globals.gcinfo]
