# Roblox Luau standard library: the complete global surface of the Roblox
# scripting runtime - core Luau libraries as Roblox ships them, plus
# Roblox globals, the task library, and constructible datatypes.
# Standalone Luau lives in luau.toml as a fully independent file - the
# two are deliberately split, not layered, because the environments
# diverge in both directions. Shared entries are duplicated on purpose;
# drift guards keep them honest. Generated data (services, enums) is
# spliced in at load from separate files.
#
# Format: see stdlib_model.rs. kind = "function" | "constant" |
# "property" | "namespace"; functions carry either a flat signature
# (min_args/max_args/params) or an overloads array; max_args = -1 means
# unbounded.

# Coverage notes vs upstream Lua:
#   - absent from the Luau VM: dofile, loadfile, load, module, io,
#     package (os keeps its sandboxed clock/date/difftime/time subset)
#   - kept from Lua 5.1: getfenv, setfenv, newproxy (Luau uses
#     getfenv/setfenv instead of _ENV)

# ---- bare-word globals ----

[globals._G]
kind = "property"
read_only = false

[globals._VERSION]
kind = "property"

[globals.assert]
kind = "function"
min_args = 1
max_args = -1
params = [
  { kind = "any" },
  { kind = "string", required = false },
  { kind = "vararg", required = false },
]

# Roblox only supports the "count" operation; gcinfo() is the supported
# equivalent.
[globals.collectgarbage]
kind = "function"
min_args = 0
max_args = 1
must_use = true
deprecated = { message = "deprecated on Roblox; use gcinfo() instead", replace_template = "gcinfo()" }
params = [
  { kind = "constant", values = ["count"], required = false },
]

[globals.error]
kind = "function"
min_args = 1
max_args = 2
params = [
  { kind = "any" },
  { kind = "number", required = false },
]

[globals.gcinfo]
kind = "function"
min_args = 0
max_args = 0
must_use = true

# Luau retains 5.1's environment model (getfenv/setfenv) instead of _ENV.
# Roblox marks both deprecated: touching an environment turns off Luau
# optimizations for the affected functions.
[globals.getfenv]
kind = "function"
min_args = 0
max_args = 1
must_use = true
deprecated = { message = "deprecated on Roblox; environment manipulation disables Luau optimizations" }
params = [{ kind = "any", required = false }]

[globals.getmetatable]
kind = "function"
min_args = 1
max_args = 1
must_use = true
params = [{ kind = "any" }]

[globals.ipairs]
kind = "function"
min_args = 1
max_args = 1
is_pure = true
must_use = true
params = [{ kind = "table" }]

# Server-side only, and only when ServerScriptService.LoadStringEnabled
# is set; still a real global that resolves everywhere.
[globals.loadstring]
kind = "function"
min_args = 1
max_args = 2
params = [{ kind = "string" }, { kind = "string", required = false }]

[globals.newproxy]
