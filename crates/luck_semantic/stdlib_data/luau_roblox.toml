# ---- value shapes ----
# Instance covers the universally-used method surface shared by every
# Roblox instance. Events (.Changed, :GetPropertyChangedSignal(...):
# Connect) and per-class properties are out of scope: they would need
# the full class hierarchy, which this model deliberately does not
# carry. Only Name and Parent are modeled as properties - they exist on
# every instance and drive the script.Parent idiom.

[shapes.Instance.members.Name]
kind = "property"
read_only = false

[shapes.Instance.members.Parent]
kind = "property"
read_only = false
shape = "Instance"

[shapes.Instance.members.Clone]
kind = "function"
method = true
must_use = true
min_args = 0
max_args = 0
params = []
returns = "Instance"

[shapes.Instance.members.Destroy]
kind = "function"
method = true
min_args = 0
max_args = 0
params = []

[shapes.Instance.members.FindFirstAncestor]
kind = "function"
method = true
must_use = true
min_args = 1
max_args = 1
params = [{ kind = "string" }]
returns = "Instance"

# OfClass/WhichIsA class-name sets use roblox_all_classes: the API dump
# does not distinguish abstract classes, so exact-class lookups accept
# the full list rather than reject valid concrete names.
[shapes.Instance.members.FindFirstAncestorOfClass]
kind = "function"
method = true
must_use = true
min_args = 1
max_args = 1
params = [{ kind = "constant", set = "roblox_all_classes" }]
returns = "Instance"

[shapes.Instance.members.FindFirstAncestorWhichIsA]
kind = "function"
method = true
must_use = true
min_args = 1
max_args = 1
params = [{ kind = "constant", set = "roblox_all_classes" }]
returns = "Instance"

[shapes.Instance.members.FindFirstChild]
kind = "function"
method = true
must_use = true
min_args = 1
max_args = 2
params = [
  { kind = "string" },
  { kind = "bool", required = false },
]
returns = "Instance"

[shapes.Instance.members.FindFirstChildOfClass]
kind = "function"
