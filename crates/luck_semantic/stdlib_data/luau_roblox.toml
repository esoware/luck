must_use = true
min_args = 1
max_args = 1
params = [{ kind = "constant", set = "roblox_all_classes" }]
returns = "Instance"

[shapes.Instance.members.FindFirstChildWhichIsA]
kind = "function"
method = true
must_use = true
min_args = 1
max_args = 2
