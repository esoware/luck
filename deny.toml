[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  # notify is CC0; webpki-roots CA data is CDLA-Permissive-2.0.
  "CC0-1.0",
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Unpublished path-only deps (luck_testgen) have no version requirement.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
